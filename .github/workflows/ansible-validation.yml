name: Ansible - Validate Playbooks

on:
  push:
    branches: [ main ]
    paths:
      - 'ansible-project/**'
      - '.github/workflows/ansible-validation.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ansible-project/**'

jobs:
  ansible-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ansible
        run: |
          pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Run ansible-lint
        working-directory: ansible-project
        run: ansible-lint -v
        continue-on-error: true

      - name: Syntax check playbook
        working-directory: ansible-project
        run: ansible-playbook setup.yml --syntax-check

      - name: Validate inventory
        working-directory: ansible-project
        run: |
          if [ ! -f inventory.ini ]; then
            echo "❌ inventory.ini not found"
            exit 1
          fi
          echo "✓ Inventory file found"

      - name: Check variables
        working-directory: ansible-project
        run: |
          for role in roles/*/; do
            if [ -f "$role/defaults/main.yml" ]; then
              echo "✓ Found defaults in $(basename $role)"
            fi
          done

      - name: Report
        if: always()
        run: |
          echo "## Ansible Validation Report"
          echo "✓ Playbook syntax valid"
          echo "✓ Inventory accessible"
          echo "✓ Roles configured"
