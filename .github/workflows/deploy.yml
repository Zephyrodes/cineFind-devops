name: Deploy - Automated Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  test-all:
    runs-on: ubuntu-latest
    name: Run All Tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: movie-app/package-lock.json

      - name: Build React app
        working-directory: movie-app
        run: |
          npm ci
          npm run build

  validate-infrastructure:
    runs-on: ubuntu-latest
    name: Validate Infrastructure
    needs: test-all
    steps:
      - uses: actions/checkout@v4

      # Generar llave SSH para evitar error en terraform validate/plan
      - name: Create SSH Key for Validation
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N "" -q

      # Setup Terraform v3 + v1.9.0 (Corrige clave GPG expirada)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Validate Terraform
        working-directory: terraform-azure
        run: |
          rm -rf .terraform
          terraform init -backend=false
          terraform validate

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate Ansible
        working-directory: ansible-project
        run: |
          pip install ansible ansible-lint
          ansible-playbook setup.yml --syntax-check

  notify:
    runs-on: ubuntu-latest
    name: Notify Deployment Status
    needs: [test-all, validate-infrastructure]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          echo "## 🚀 Deployment Workflow Status"
          if [ "${{ needs.test-all.result }}" = "success" ] && [ "${{ needs.validate-infrastructure.result }}" = "success" ]; then
            echo "✓ All checks passed"
          else
            echo "❌ Some checks failed"
          fi

  create-release:
    runs-on: ubuntu-latest
    name: Create Release
    needs: [test-all, validate-infrastructure]
    if: github.ref == 'refs/heads/main' && needs.test-all.result == 'success'
    
    # Permisos necesarios para solucionar "Resource not accessible by integration"
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: |
            ## Automated Release v${{ github.run_number }}
            
            - Build: Successful (Node 22)
            - Infrastructure: Validated (Terraform 1.9.0)
            - Deployment: Ready
            
            **Commit:** ${{ github.sha }}
            **Actor:** ${{ github.actor }}
          draft: false
          prerelease: false
