name: Terraform - Validate & Plan

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform-azure/**'
      - '.github/workflows/terraform-validation.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform-azure/**'

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Crear llave SSH dummy para que file("~/.ssh/id_rsa.pub") no falle
      - name: Create Dummy SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "ssh-rsa AAAAB3Nza1yc2EAAAADAQABAAABAQC8zL1p3E..." > ~/.ssh/id_rsa.pub

      # 2. Configurar Terraform (v1.9.0 corrige el error de "key expired")
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # 3. Inicializar (con limpieza de caché preventiva)
      - name: Initialize Terraform
        working-directory: terraform-azure
        run: |
          rm -rf .terraform
          terraform init -backend=false

      # 4. Verificar formato
      - name: Format check
        working-directory: terraform-azure
        run: terraform fmt -check -recursive
        continue-on-error: true

      # 5. Validar (ahora encontrará el archivo en ~/.ssh/)
      - name: Validate configuration
        working-directory: terraform-azure
        run: terraform validate

      # 6. Generar Plan
      - name: Plan (dry-run)
        working-directory: terraform-azure
        run: terraform plan -out=tfplan -input=false
        env:
          TF_VAR_location: eastus
          TF_VAR_environment: preview
        continue-on-error: true

      # 7. Subir el artefacto del plan
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-plan
          path: terraform-azure/tfplan
          retention-days: 5

      # 8. Comentar en el PR si aplica
      - name: Comment PR with plan
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = 'terraform-azure/tfplan';
            
            if (fs.existsSync(planPath)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '### ✓ Terraform Plan Completado\n\nEl plan de infraestructura se ha generado con éxito usando una llave SSH de validación. Puedes revisar los detalles en los artefactos del run.'
              });
            }
