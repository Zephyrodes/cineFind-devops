name: Terraform - Validate & Plan

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform-azure/**'
      - '.github/workflows/terraform-validation.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform-azure/**'

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Generar una llave SSH real al vuelo. 
      # Esto garantiza que el formato sea 100% válido para el proveedor de Azure.
      - name: Create Real SSH Key for Validation
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N "" -q
          echo "✓ Llave SSH generada correctamente para validación"

      # 2. Configurar Terraform (v1.9.0 para evitar errores de firmas GPG)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # 3. Inicializar
      - name: Initialize Terraform
        working-directory: terraform-azure
        run: |
          rm -rf .terraform
          terraform init -backend=false

      # 4. Verificar formato
      - name: Format check
        working-directory: terraform-azure
        run: terraform fmt -check -recursive
        continue-on-error: true

      # 5. Validar (Ahora leerá la llave real recién generada)
      - name: Validate configuration
        working-directory: terraform-azure
        run: terraform validate

      # 6. Generar Plan
      - name: Plan (dry-run)
        working-directory: terraform-azure
        run: terraform plan -out=tfplan -input=false
        env:
          TF_VAR_location: eastus
          TF_VAR_environment: preview
        continue-on-error: true

      # 7. Subir el artefacto del plan
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-plan
          path: terraform-azure/tfplan
          retention-days: 5

      # 8. Comentar en el PR
      - name: Comment PR with plan
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = 'terraform-azure/tfplan';
            
            if (fs.existsSync(planPath)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '### ✓ Terraform CI\n\nLa configuración ha sido validada con éxito. Se ha generado una llave SSH temporal para el proceso de validación técnica.'
              });
            }
